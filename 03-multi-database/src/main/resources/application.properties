server.port=8080
spring.jpa.open-in-view=false

# PostgreSQL backend, via OJP
# These map onto the SimpleDriverDataSource bean via @ConfigurationProperties.
app.datasource.postgres.driver-class=org.openjproxy.jdbc.Driver
app.datasource.postgres.url=jdbc:ojp[localhost:1059]_postgresql://localhost:5432/defaultdb
app.datasource.postgres.username=testuser
app.datasource.postgres.password=testpassword

# MySQL backend, via the SAME OJP server
app.datasource.mysql.driver-class=org.openjproxy.jdbc.Driver
app.datasource.mysql.url=jdbc:ojp[localhost:1059]_mysql://localhost:3306/defaultdb
app.datasource.mysql.username=testuser
app.datasource.mysql.password=testpassword
