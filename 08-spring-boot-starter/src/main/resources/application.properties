server.port=8080
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# With the OJP starter on the classpath
# The starter auto-configures the OJP driver + a non-pooling datasource, so in
# principle you only need to declare WHERE the OJP server is and WHICH backend DB.
#
# The cleanest, most version-proof approach is still the standard datasource URL
# with the ojp[...]_ prefix the starter recognizes it and wires the rest:
spring.datasource.url=jdbc:ojp[localhost:1059]_postgresql://localhost:5432/defaultdb
spring.datasource.username=testuser
spring.datasource.password=testpassword

# NOTE: depending on the starter version you may NOT need to set
# driver-class-name or datasource.type manually the starter sets sensible
# defaults. If your build still requires them, fall back to the manual trio:
#   spring.datasource.driver-class-name=org.openjproxy.jdbc.Driver
#   spring.datasource.type=org.springframework.jdbc.datasource.SimpleDriverDataSource
#
# Confirm the supported property keys for your version here:
#   https://github.com/Open-J-Proxy/ojp/blob/main/documents/java-frameworks/README.md
