# 1. JDBC URL prefixed with ojp[<ojp-server-host>:<port>]_
#    The part after the underscore is your NORMAL PostgreSQL JDBC URL.
#    [localhost:1059] points at the OJP SERVER, not the database.
spring.datasource.url=jdbc:ojp[localhost:1059]_postgresql://localhost:5432/defaultdb

# 2. Use the OJP driver instead of the native PostgreSQL driver.
spring.datasource.driver-class-name=org.openjproxy.jdbc.Driver

# 3. SimpleDriverDataSource = no local pooling. Connections are created/closed
#    on demand; the real pooling happens in the OJP server.
spring.datasource.type=org.springframework.jdbc.datasource.SimpleDriverDataSource

# Credentials are forwarded by the OJP driver to the server, which uses them
# to open the real backend connections.
spring.datasource.username=testuser
spring.datasource.password=testpassword


# Let Hibernate create the table for this demo. Use 'validate' or 'none' in prod.
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

server.port=8080

# Optional: confirm in the logs that no HikariCP pool starts up.
logging.level.com.zaxxer.hikari=DEBUG
