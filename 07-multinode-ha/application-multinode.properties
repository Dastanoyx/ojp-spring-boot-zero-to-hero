# The multinode magic: list BOTH OJP nodes in the URL. The driver does
# load-aware routing across them, keeps a session sticky to one node, and fails
# over automatically if a node goes down — no external load balancer involved.
#
#   jdbc:ojp[host1:port1,host2:port2]_<original-jdbc-url>

spring.datasource.url=jdbc:ojp[localhost:1059,localhost:1060]_postgresql://localhost:5432/defaultdb
spring.datasource.driver-class-name=org.openjproxy.jdbc.Driver
spring.datasource.type=org.springframework.jdbc.datasource.SimpleDriverDataSource
spring.datasource.username=testuser
spring.datasource.password=testpassword

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
server.port=8080
