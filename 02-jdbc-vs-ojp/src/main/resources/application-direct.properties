# DIRECT JDBC: the traditional setup
# Native PostgreSQL driver, HikariCP pool living inside THIS app instance.
spring.datasource.url=jdbc:postgresql://localhost:5432/defaultdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=testuser
spring.datasource.password=testpassword

# Explicit HikariCP pool, per instance. Scale to N instances => N of these pools.
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.pool-name=DirectHikari
