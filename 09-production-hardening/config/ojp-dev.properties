# OJP JDBC driver config DEV
# These tune the CLIENT-side OJP driver behavior. Place on the classpath or point
# the driver at it per the connection-pool config docs.
# Reference: https://github.com/Open-J-Proxy/ojp/blob/main/documents/configuration/ojp-jdbc-configuration.md

# Generous timeouts, verbose, small footprint fine for a laptop.
ojp.connection.pool.maximumPoolSize=5
ojp.connection.pool.minimumIdle=1
ojp.connection.pool.connectionTimeout=30000
